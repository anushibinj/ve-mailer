# Use an in-memory H2 database for tests so they never conflict with a running backend instance
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=false

# Recreate schema on every test run
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Mail — provide stub values so JavaMailSender auto-configures without connecting
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test
spring.mail.test-connection=false
